seed: 42

reproducibility:
  seed: 42
  deterministic: true
  benchmark: false
  warn_only: true

distributed:
  enabled: true
  backend: nccl
  find_unused_parameters: false

data:
  embedding_dir: data/processed/stage2/embeddings

model:
  hidden_size: 256
  objective: flow_matching
  num_layers: 12

training:
  batch_size: 64
  max_steps: 200000
  learning_rate: 0.0001
  output_dir: outputs/stage2_diffusion
